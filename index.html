<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BPS Data Explorer</title>
<style>
  :root{
    --bg:#f1f4f9; --surface:#fff; --ink:#0f172a; --muted:#64748b;
    --border:#e2e8f0; --accent:#4f46e5; --accent-2:#7c3aed; --accent-soft:#eef2ff;
    --success:#059669; --warn:#d97706; --danger:#dc2626;
    --shadow:0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg:0 10px 30px rgba(15,23,42,.1), 0 4px 12px rgba(15,23,42,.06);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Inter',sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* HEADER with gradient */
  header{
    background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#ec4899 100%);
    color:#fff; padding:16px 24px;
    display:flex; align-items:center; gap:14px;
    box-shadow:0 2px 8px rgba(79,70,229,.25);
    position:sticky; top:0; z-index:50;
  }
  header .logo{
    width:36px; height:36px; background:rgba(255,255,255,.2); border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:20px;
    backdrop-filter:blur(10px);
  }
  header h1{margin:0; font-size:18px; font-weight:700; letter-spacing:-.01em}
  header .sub{opacity:.85; font-size:12px; font-weight:500; margin-top:2px; display:block}
  header .title-wrap{flex:1}

  /* LAYOUT */
  .layout{display:grid; grid-template-columns:260px 1fr; min-height:calc(100vh - 68px)}
  @media (max-width:768px){
    .layout{grid-template-columns:1fr}
    nav{border-right:0; border-bottom:1px solid var(--border)}
  }

  /* SIDEBAR */
  nav{
    background:var(--surface); border-right:1px solid var(--border);
    padding:16px 10px; overflow-y:auto;
  }
  nav .group{
    font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.08em; color:var(--muted);
    padding:14px 12px 6px;
  }
  nav button{
    display:flex; align-items:center; gap:10px;
    width:100%; text-align:left; padding:9px 12px; margin:1px 0;
    border:0; background:transparent; cursor:pointer;
    font-size:14px; color:#334155; border-radius:8px;
    transition:all .15s ease;
  }
  nav button:hover{background:#f8fafc; color:var(--ink)}
  nav button.active{
    background:var(--accent-soft); color:var(--accent);
    font-weight:600;
  }
  nav button.active::before{
    content:''; width:3px; height:16px; background:var(--accent);
    border-radius:2px; position:absolute; margin-left:-15px;
  }
  nav button .ico{font-size:16px; flex-shrink:0}

  /* MAIN */
  main{padding:24px; overflow-x:hidden; max-width:100%}

  /* CONTROLS */
  .controls{
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;
    align-items:center; background:var(--surface); padding:14px;
    border-radius:12px; box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .controls label{
    font-size:12px; font-weight:600; color:var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  .controls select,.controls input{
    padding:9px 12px; border:1px solid var(--border); border-radius:8px;
    font-size:14px; background:#fff; color:var(--ink);
    transition:all .15s;
  }
  .controls select:focus,.controls input:focus{
    outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(79,70,229,.1);
  }
  .controls input{min-width:260px; flex:1}
  .controls button{
    padding:9px 18px; background:var(--accent); color:#fff;
    border:0; border-radius:8px; cursor:pointer; font-weight:600;
    font-size:14px; transition:all .15s;
  }
  .controls button:hover{background:#4338ca; transform:translateY(-1px);
    box-shadow:0 4px 12px rgba(79,70,229,.3)}

  .hint{
    font-size:13px; color:var(--muted); margin-bottom:12px;
    display:flex; align-items:center; gap:6px;
  }
  .status{
    font-size:13px; color:var(--muted); margin:0 0 14px;
    min-height:20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }

  /* RESULTS */
  .results{
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; box-shadow:var(--shadow);
  }
  .results table{width:100%; border-collapse:collapse; table-layout:auto}
  .results th,.results td{
    padding:12px 16px; text-align:left;
    border-bottom:1px solid var(--border);
    font-size:14px; vertical-align:top;
    word-break:break-word; overflow-wrap:anywhere;
  }
  .results th{
    background:#f8fafc; font-weight:600; color:var(--muted);
    font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    position:sticky; top:0;
  }
  .results tr:last-child td{border-bottom:0}
  .results tr:hover td{background:#fafbfc}
  .results .cell-title{font-weight:600; color:var(--ink); line-height:1.4}
  .results .cell-meta{font-size:12px; color:var(--muted); margin-top:3px}

  /* PAGER */
  .pager{
    display:flex; gap:10px; align-items:center; padding:12px;
    border-top:1px solid var(--border); justify-content:center;
    background:#fafbfc;
  }
  .pager button{
    padding:7px 14px; border:1px solid var(--border); background:#fff;
    border-radius:8px; cursor:pointer; font-size:13px; font-weight:500;
    color:var(--ink); transition:all .15s;
  }
  .pager button:hover:not(:disabled){background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
  .pager button:disabled{opacity:.4; cursor:not-allowed}
  .pager span{font-size:13px; color:var(--muted); padding:0 6px}

  /* PILL & BADGES */
  .pill{
    display:inline-block; padding:3px 10px; border-radius:20px;
    font-size:11px; font-weight:700; letter-spacing:.02em; text-transform:uppercase;
    background:var(--accent-soft); color:var(--accent);
  }
  .pill.muted{background:#f1f5f9; color:var(--muted)}

  /* LINKS & BUTTONS */
  a{color:var(--accent); text-decoration:none; font-weight:500}
  a:hover{text-decoration:underline}
  .btn-small{
    padding:5px 12px; font-size:12px; background:var(--accent-soft);
    border:1px solid transparent; border-radius:6px; cursor:pointer;
    color:var(--accent); font-weight:600; transition:all .15s;
  }
  .btn-small:hover{background:var(--accent); color:#fff}
  .btn-outline{
    padding:5px 12px; font-size:12px; background:#fff;
    border:1px solid var(--border); border-radius:6px; cursor:pointer;
    color:var(--ink); font-weight:500; text-decoration:none;
    display:inline-flex; align-items:center; gap:4px;
  }
  .btn-outline:hover{border-color:var(--accent); color:var(--accent); text-decoration:none}

  /* EMPTY STATE */
  .empty{padding:48px 24px; text-align:center; color:var(--muted)}
  .empty .big-ico{font-size:48px; margin-bottom:12px; opacity:.5}
  .empty h3{margin:0 0 8px; color:var(--ink); font-size:18px}

  /* MODAL */
  .modal-bg{
    display:none; position:fixed; inset:0;
    background:rgba(15,23,42,.6); backdrop-filter:blur(4px);
    z-index:100; align-items:center; justify-content:center; padding:20px;
    animation:fadeIn .15s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-bg.show{display:flex}
  .modal{
    background:var(--surface); border-radius:14px; max-width:880px; width:100%;
    max-height:85vh; overflow:auto; padding:24px;
    box-shadow:var(--shadow-lg); animation:slideUp .2s ease;
  }
  @keyframes slideUp{from{transform:translateY(10px); opacity:0}to{transform:translateY(0); opacity:1}}
  .modal h3{margin:0 0 14px; color:var(--ink); font-size:20px; font-weight:700}
  .modal pre{
    background:#0f172a; color:#e2e8f0; padding:14px; border-radius:8px;
    overflow:auto; font-size:12px; white-space:pre-wrap;
    word-break:break-word; line-height:1.5;
  }
  .modal table{width:100%; border-collapse:collapse; font-size:13px}
  .modal table th,.modal table td{
    padding:8px 12px; border-bottom:1px solid var(--border); text-align:left;
    word-break:break-word;
  }
  .modal table th{background:#f8fafc; font-weight:600; color:var(--muted);
    font-size:11px; text-transform:uppercase; letter-spacing:.05em}
  .close-btn{
    float:right; border:0; background:#f1f5f9; padding:6px 14px;
    border-radius:8px; cursor:pointer; font-size:13px; color:var(--muted);
    font-weight:500; transition:all .15s;
  }
  .close-btn:hover{background:var(--border); color:var(--ink)}

  /* LOADING */
  .loading{display:inline-block; width:12px; height:12px; border:2px solid #e2e8f0;
    border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite;
    margin-right:6px; vertical-align:middle;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>
<body>
<header>
  <div class="logo">📊</div>
  <div class="title-wrap">
    <h1>BPS Data Explorer</h1>
    <span class="sub">Portal data statistik Indonesia · webapi.bps.go.id</span>
  </div>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main>
    <div class="controls">
      <label>Wilayah:
        <select id="domain"><option value="0000">Indonesia (Pusat)</option></select>
      </label>
      <input id="keyword" placeholder="Cari keyword (opsional)…">
      <button id="searchBtn">🔍 Cari</button>
    </div>
    <div class="hint" id="hint"></div>
    <div class="status" id="status"></div>
    <div class="results" id="results"></div>
  </main>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">Tutup ✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const MODELS = [
  {group:'Data Statistik', items:[
    {id:'data',        name:'Data Dinamis',        icon:'📈', hint:'Angka statistik time-series (perlu pilih variabel)'},
    {id:'var',         name:'Variable',            icon:'🔢', hint:'Variabel/indikator — dari sini dapatkan data angkanya'},
    {id:'subject',     name:'Subject',             icon:'📚', hint:'Kategori besar statistik'},
    {id:'statictable', name:'Tabel Statis',        icon:'📋', hint:'Tabel siap tampil'},
    {id:'indicators',  name:'Indikator Strategis', icon:'⭐', hint:'Indikator utama terbaru'},
  ]},
  {group:'Konten', items:[
    {id:'publication', name:'Publikasi',           icon:'📖', hint:'Publikasi BPS (PDF)'},
    {id:'pressrelease',name:'Siaran Pers',         icon:'📰', hint:'Press release'},
    {id:'infographic', name:'Infografis',          icon:'🖼️', hint:'Gambar infografis'},
  ]},
  {group:'Lainnya', items:[
    {id:'sdgs',        name:'SDGs',                icon:'🌍', hint:'Sustainable Development Goals'},
    {id:'glosarium',   name:'Glosarium',           icon:'📑', hint:'Definisi istilah statistik'},
  ]},
];

let currentModel = 'publication';
let currentPage = 1;

async function api(endpoint, params) {
  const qs = new URLSearchParams(params);
  const res = await fetch(`/api/${endpoint}?${qs}`, {
    headers: { 'X-App-Password': localStorage.getItem('bps_pwd') || '' }
  });
  if (res.status === 401) { showLogin(); throw new Error('Butuh login'); }
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function checkAuth() {
  const pwd = localStorage.getItem('bps_pwd') || '';
  const r = await fetch('/auth/check', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password: pwd})
  });
  const data = await r.json();
  if (!data.auth_required) return true;
  if (r.ok && data.ok) return true;
  showLogin();
  return false;
}

function showLogin() {
  const html = `
    <h3>🔒 Login</h3>
    <p style="color:#666;font-size:13px">Tool ini dilindungi password.</p>
    <input id="pwdInput" type="password" placeholder="Password"
      style="width:100%;padding:10px;border:1px solid #d1d5da;border-radius:6px;font-size:14px;margin-bottom:10px"
      onkeyup="if(event.key==='Enter')submitLogin()">
    <button onclick="submitLogin()"
      style="padding:10px 18px;background:#1a5490;color:#fff;border:0;border-radius:6px;cursor:pointer;font-weight:600;width:100%">
      Masuk
    </button>
    <div id="loginErr" style="color:#c00;font-size:13px;margin-top:10px"></div>
  `;
  openModal(html);
  setTimeout(()=>document.getElementById('pwdInput')?.focus(), 50);
}

async function submitLogin() {
  const pwd = document.getElementById('pwdInput').value;
  const r = await fetch('/auth/check', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password: pwd})
  });
  if (r.ok) {
    localStorage.setItem('bps_pwd', pwd);
    closeModal();
    search();
  } else {
    document.getElementById('loginErr').textContent = '❌ Password salah';
  }
}

function flatModel(id){
  for (const g of MODELS) for (const m of g.items) if (m.id===id) return m;
  return null;
}

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  MODELS.forEach(g => {
    const h = document.createElement('div');
    h.className = 'group';
    h.textContent = g.group;
    nav.appendChild(h);
    g.items.forEach(m => {
      const b = document.createElement('button');
      b.innerHTML = `<span class="ico">${m.icon || '•'}</span><span>${m.name}</span>`;
      b.title = m.hint;
      if (m.id === currentModel) b.classList.add('active');
      b.onclick = () => { currentModel = m.id; currentPage=1; buildNav(); updateHint(); search(); };
      nav.appendChild(b);
    });
  });
}

function updateHint() {
  const m = flatModel(currentModel);
  document.getElementById('hint').textContent = m ? `💡 ${m.hint}` : '';
}

async function loadDomains() {
  const sel = document.getElementById('domain');
  try {
    const r = await api('domain', {type:'all'});
    if (!r.data) return;
    const list = [];
    (Array.isArray(r.data)?r.data:[]).forEach(x => {
      if (Array.isArray(x)) x.forEach(d=>list.push(d));
      else if (x && x.domain_id) list.push(x);
    });
    list.sort((a,b)=>String(a.domain_id).localeCompare(String(b.domain_id)));
    list.forEach(d => {
      if (!d.domain_id || d.domain_id==='0000') return;
      const o = document.createElement('option');
      o.value = d.domain_id;
      o.textContent = `${d.domain_id} · ${d.domain_name}`;
      sel.appendChild(o);
    });
  } catch (e) {
    console.warn('load domains:', e);
  }
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTable(rows, cols) {
  if (!rows || !rows.length) return '<div class="empty">Tidak ada data.</div>';
  let h = '<table><thead><tr>';
  cols.forEach(c => h += `<th>${c.label}</th>`);
  h += '</tr></thead><tbody>';
  rows.forEach(r => {
    h += '<tr>';
    cols.forEach(c => {
      const v = c.render ? c.render(r) : (r[c.key] ?? '');
      h += `<td>${v}</td>`;
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

async function search() {
  const status = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  status.textContent = 'Memuat…';
  resultsEl.innerHTML = '';

  const domain = document.getElementById('domain').value;
  const keyword = document.getElementById('keyword').value.trim();

  const params = {
    model: currentModel,
    domain: domain,
    page: currentPage,
    lang: 'ind'
  };
  if (keyword) params.keyword = keyword;

  // Model "data" tidak bisa di-list langsung — butuh var ID dulu
  if (currentModel === 'data') {
    status.textContent = '';
    resultsEl.innerHTML = `
      <div style="padding:40px;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">📊</div>
        <h3 style="margin:0 0 12px">Data Dinamis</h3>
        <p style="color:#555;max-width:480px;margin:0 auto 14px;line-height:1.5">
          Endpoint ini butuh <b>Variable ID</b> spesifik — tidak bisa di-list dengan pencarian biasa.
        </p>
        <p style="color:#555;max-width:480px;margin:0 auto 18px;line-height:1.5">
          Cara pakai:
        </p>
        <ol style="text-align:left;max-width:420px;margin:0 auto;color:#333;line-height:1.8">
          <li>Klik menu <b>Variable</b> di sidebar kiri</li>
          <li>Pilih <b>Wilayah</b> yang diinginkan (dropdown atas)</li>
          <li>Cari variabel yang diinginkan (mis. "kemiskinan", "inflasi")</li>
          <li>Klik tombol <b>📈 Tampilkan Data</b> di baris variabel tersebut</li>
        </ol>
        <div style="margin-top:24px">
          <button class="btn-small" onclick="currentModel='var';currentPage=1;buildNav();updateHint();search()">
            → Buka Menu Variable
          </button>
        </div>
      </div>`;
    return;
  }

  try {
    const r = await api('list', params);
    if (!r) {
      status.innerHTML = `<span style="color:#c00">❌ Response kosong dari server</span>`;
      return;
    }
    if (r.status !== 'OK' && r.status !== 'ok') {
      status.innerHTML = `<span style="color:#c00">❌ ${esc(r.status || 'error')} — ${esc(JSON.stringify(r).slice(0,200))}</span>`;
      return;
    }
    const arr = Array.isArray(r.data) ? r.data : [];
    const pagination = arr[0] && typeof arr[0]==='object' && !Array.isArray(arr[0]) ? arr[0] : {};
    const items = (arr[1] || []);
    status.innerHTML = `<span class="pill">${esc(currentModel)}</span> &nbsp; Wilayah <b>${esc(domain)}</b> &nbsp; · &nbsp; Hal. ${pagination.page||1}/${pagination.pages||1} &nbsp; · &nbsp; Total <b>${pagination.total ?? items.length}</b>`;
    resultsEl.innerHTML = renderByModel(currentModel, items) + renderPager(pagination);
  } catch (e) {
    status.innerHTML = `<span style="color:#c00">❌ ${esc(e.message)}</span>`;
  }
}

function renderPager(p) {
  if (!p || !p.pages || p.pages<=1) return '';
  return `<div class="pager">
    <button ${p.page<=1?'disabled':''} onclick="currentPage=Math.max(1,currentPage-1); search()">‹ Prev</button>
    <span>Halaman ${p.page} / ${p.pages}</span>
    <button ${p.page>=p.pages?'disabled':''} onclick="currentPage++; search()">Next ›</button>
  </div>`;
}

function renderByModel(model, items) {
  if (!items.length) return '<div class="empty">Tidak ada hasil.</div>';
  const tables = {
    publication: [
      {label:'Judul', render:r=>`<div class="cell-title">${esc(r.title)}</div>`},
      {label:'Tanggal', key:'rl_date'},
      {label:'ISSN/ISBN', render:r=>esc(r.issn || r.isbn || '')},
      {label:'Aksi', render:r=>r.pdf?`<a href="${esc(r.pdf)}" target="_blank">📄 PDF ↗</a>`:''},
    ],
    pressrelease: [
      {label:'Judul', render:r=>`<div class="cell-title">${esc(r.title)}</div>`},
      {label:'Tanggal', key:'rl_date'},
      {label:'Subject', render:r=>esc(r.subj || '')},
      {label:'PDF', render:r=>r.pdf?`<a href="${esc(r.pdf)}" target="_blank">↗</a>`:''},
    ],
    statictable: [
      {label:'ID', key:'table_id'},
      {label:'Judul', render:r=>`<div class="cell-title">${esc(r.title)}</div>`},
      {label:'Subject', render:r=>esc(r.subj || '')},
      {label:'Aksi', render:r=>`<button class="btn-small" onclick="viewItem('statictable',${r.table_id})">Lihat</button>`},
    ],
    indicators: [
      {label:'Judul', render:r=>esc(r.title)},
      {label:'Satuan', render:r=>esc(r.unit || '')},
      {label:'Nilai terkini', render:r=>esc(r.value || r.last_value || '')},
      {label:'Update', render:r=>esc(r.updt_date || r.rl_date || '')},
    ],
    infographic: [
      {label:'Judul', render:r=>esc(r.title)},
      {label:'Tanggal', key:'rl_date'},
      {label:'Gambar', render:r=>r.img?`<a href="${esc(r.img)}" target="_blank">🖼 Lihat ↗</a>`:''},
    ],
    sdgs: [
      {label:'Judul', render:r=>esc(r.title)},
      {label:'Goal/Target', render:r=>esc(r.goal || r.target || '')},
      {label:'Aksi', render:r=>`<button class="btn-small" onclick='showDetail(${JSON.stringify(JSON.stringify(r))}, "sdgs")'>Detail</button>`},
    ],
    subject: [
      {label:'ID', render:r=>esc(r.subj_id || r.id)},
      {label:'Subject', render:r=>esc(r.title)},
    ],
    var: [
      {label:'Var ID', render:r=>esc(r.var_id)},
      {label:'Nama Variabel', render:r=>`<div class="cell-title">${esc(r.title)}</div>`},
      {label:'Subject', render:r=>esc(r.sub_name || '')},
      {label:'Aksi', render:r=>`<button class="btn-small" onclick="viewData('${r.var_id}')">📈 Tampilkan Data</button>`},
    ],
    glosarium: [
      {label:'Istilah', render:r=>'<b>'+esc(r.title)+'</b>'},
      {label:'Definisi', render:r=>esc(r.description || r.desc || '')},
    ],
    data: [
      {label:'Item', render:r=>`<pre style="margin:0;white-space:pre-wrap;font-size:12px">${esc(JSON.stringify(r).slice(0,500))}</pre>`},
    ],
  };
  const cols = tables[model];
  if (cols) return renderTable(items, cols);
  return renderTable(items, [
    {label:'Raw', render:r=>`<pre style="margin:0;white-space:pre-wrap;font-size:12px">${esc(JSON.stringify(r).slice(0,400))}</pre>`}
  ]);
}

// Decode HTML entities (&lt; &gt; &quot; &#039; &amp; dll)
function decodeHtmlEntities(str) {
  if (!str) return '';
  const txt = document.createElement('textarea');
  txt.innerHTML = str;
  return txt.value;
}

async function viewItem(model, id) {
  openModal('<div style="text-align:center;padding:30px"><span class="loading"></span> Memuat…</div>');
  const domain = document.getElementById('domain').value;
  try {
    const r = await api('view', {model, domain, id, lang:'ind'});
    if (!r) {
      openModal(`
        <h3>📭 Tidak ada detail</h3>
        <p style="color:var(--muted)">Endpoint <code>view</code> untuk ${esc(model)} #${esc(id)} tidak mengembalikan data.</p>
        <p style="color:var(--muted);font-size:13px">Coba ganti wilayah ke <b>0000 · Indonesia (Pusat)</b> — banyak tabel hanya tersedia di domain pusat.</p>
      `);
      return;
    }
    const d = r.data || r;

    // Khusus tabel statis: render HTML tabelnya di iframe (isolasi CSS)
    if (model === 'statictable') {
      const tableHtml = decodeHtmlEntities(d.table || '');
      const related = Array.isArray(d.related) ? d.related : [];
      let html = `<h3>${esc(d.title || 'Tabel Statis #' + id)}</h3>`;
      html += `<div style="color:var(--muted);font-size:13px;margin-bottom:14px;display:flex;gap:14px;flex-wrap:wrap">`;
      if (d.subcsa)    html += `<span>📚 <b>${esc(d.subcsa)}</b></span>`;
      if (d.cr_date)   html += `<span>📅 Dibuat: ${esc(String(d.cr_date).slice(0,10))}</span>`;
      if (d.updt_date) html += `<span>🔄 Update: ${esc(String(d.updt_date).slice(0,10))}</span>`;
      if (d.size)      html += `<span>📦 ${esc(d.size)}</span>`;
      html += `</div>`;

      if (d.excel) {
        html += `<div style="margin-bottom:16px;padding:10px 14px;background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;font-size:13px;color:#78350f">
          ⚠️ <b>Download Excel butuh session di web BPS.</b> Klik tombol di bawah untuk buka URL → login/lanjut di tab baru (kalau belum login, akan dialihkan).<br>
          <a href="${esc(d.excel)}" target="_blank" class="btn-small" style="margin-top:8px;padding:7px 14px;font-size:13px;display:inline-block">🔗 Buka Link Download di Tab Baru</a>
        </div>`;
      }

      // Render tabel dalam iframe sandbox biar CSS Excel inline ter-isolasi
      const iframeDoc = `
        <!DOCTYPE html><html><head><meta charset="UTF-8">
        <style>
          body{margin:0;padding:8px;font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:13px;color:#222;background:#fff}
          table{border-collapse:collapse !important;width:auto;min-width:100%}
          td,th{border:1px solid #cbd5e1 !important;padding:6px 10px !important;vertical-align:middle !important;white-space:nowrap}
          tr:first-child td{background:#f1f5f9 !important}
        </style></head><body>${tableHtml}</body></html>
      `;
      const iframeSrcdoc = iframeDoc.replace(/"/g, '&quot;');
      html += `<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff">
        <iframe srcdoc="${iframeSrcdoc}" style="width:100%;height:500px;border:0;display:block" sandbox="allow-same-origin"></iframe>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-top:8px">💡 Tabel di-scroll horizontal/vertikal di dalam frame. Untuk full view, download Excel-nya.</p>`;

      if (related.length) {
        html += `<div style="margin-top:20px"><h4 style="font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px">🔗 Tabel Terkait</h4>`;
        html += `<ul style="padding-left:18px;line-height:1.7;font-size:13px">`;
        related.forEach(rel => {
          const link = rel.link ? `https://www.bps.go.id${rel.link}` : '#';
          html += `<li><a href="${esc(link)}" target="_blank">${esc(rel.title)}</a></li>`;
        });
        html += `</ul></div>`;
      }
      openModal(html);
      return;
    }

    // Default fallback untuk model lain: kartu metadata + raw
    let html = `<h3>Detail ${esc(model)} #${esc(id)}</h3>`;
    if (d.title) html += `<p style="font-size:16px;font-weight:600;color:var(--ink)">${esc(d.title)}</p>`;
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;font-size:13px">`;
    Object.entries(d).forEach(([k,v]) => {
      if (['title','table','datacontent','related','excel'].includes(k)) return;
      if (v == null || (typeof v === 'object' && !Array.isArray(v))) return;
      const val = Array.isArray(v) ? `${v.length} item` : String(v).slice(0,200);
      html += `<div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">${esc(k)}</div><div style="font-weight:500">${esc(val)}</div></div>`;
    });
    html += `</div>`;
    if (d.pdf)   html += `<p><a href="${esc(d.pdf)}" target="_blank" class="btn-small">📄 Buka PDF</a></p>`;
    if (d.excel) html += `<p><a href="${esc(d.excel)}" target="_blank" class="btn-small">⬇️ Download Excel</a></p>`;
    html += `<details style="margin-top:14px;font-size:12px;color:var(--muted)"><summary style="cursor:pointer">Raw JSON</summary><pre style="max-height:300px">${esc(JSON.stringify(d, null, 2))}</pre></details>`;
    openModal(html);
  } catch (e) {
    openModal(`<h3>❌ Error</h3><pre>${esc(e.message)}</pre>`);
  }
}

async function viewData(varId) {
  openModal('Memuat data…');
  const domain = document.getElementById('domain').value;
  try {
    const r = await api('list', {model:'data', domain, var:varId, lang:'ind'});

    // Handle BPS error / data tidak tersedia
    if (!r || r.status === 'Error' || r['data-availability'] === 'not-available' || !r.datacontent) {
      const bpsMsg = (r && (r.message || r['data-availability'] || r.status)) || 'Data tidak tersedia';
      openModal(`
        <h3>📭 Data tidak tersedia</h3>
        <p style="color:#555">Variabel <b>#${esc(varId)}</b> tidak tersedia untuk wilayah <b>${esc(domain)}</b>.</p>
        <p style="color:#888;font-size:13px">Pesan API: <code>${esc(bpsMsg)}</code></p>
        <div style="background:#fff8e6;border:1px solid #ffd966;padding:12px;border-radius:6px;margin-top:14px">
          <p style="margin:0 0 6px"><b>💡 Kemungkinan besar karena:</b></p>
          <ul style="margin:0;padding-left:20px;color:#444;font-size:13px;line-height:1.6">
            <li>Variabel ini hanya ada di level <b>Nasional</b> → ganti wilayah ke <b>0000 · Indonesia (Pusat)</b></li>
            <li>Variabel ini hanya ada di level <b>Provinsi</b> → pilih kode provinsi (1100, 3100, dst) — bukan kab/kota</li>
            <li>Variabel ini belum dipublikasi oleh BPS daerah yang kamu pilih</li>
          </ul>
        </div>
        <details style="margin-top:14px;font-size:12px;color:#888">
          <summary style="cursor:pointer">Raw response (untuk debugging)</summary>
          <pre style="max-height:300px">${esc(JSON.stringify(r, null, 2))}</pre>
        </details>
      `);
      return;
    }

    // Build lookup dari metadata response
    const lookupFrom = (arr, keyField='val', labelField='label') => {
      const m = {};
      (arr || []).forEach(x => { if (x && x[keyField] != null) m[String(x[keyField])] = x[labelField] || ''; });
      return m;
    };
    const vervar  = lookupFrom(r.vervar);
    const tahun   = lookupFrom(r.tahun);
    const turvar  = lookupFrom(r.turvar);
    const turtahun= lookupFrom(r.turtahun);
    const varMeta = (r.var && r.var[0]) || {};
    const satuan  = (r.satuan && r.satuan[0] && r.satuan[0].label) || varMeta.unit || '';

    // Parse key "vervarId_turvarId_varId_tahunIdTurtahunId"
    const decode = (key) => {
      const parts = key.split('_');
      const ver = parts[0], tvar = parts[1], vr = parts[2], last = parts.slice(3).join('_');
      // last = tahunId + turtahunId (turtahun 2 digit di akhir biasanya)
      let th = last, tt = '';
      if (last && last.length > 3) { th = last.slice(0,-3); tt = last.slice(-3); }
      return {
        wilayah: vervar[ver] || ver,
        turunan: turvar[tvar] || '',
        tahun: tahun[th] || th,
        periode: turtahun[tt] || ''
      };
    };

    const content = r.datacontent || {};
    const rows = Object.entries(content);

    let html = `<h3>${esc(varMeta.label || 'Variabel #' + varId)}</h3>`;
    html += `<p style="color:#666;font-size:13px;margin-top:4px">`;
    html += `Wilayah: <b>${esc(domain)}</b> · Satuan: <b>${esc(satuan || '-')}</b> · Total titik data: <b>${rows.length}</b>`;
    html += `</p>`;

    if (!rows.length) {
      html += '<p style="color:#888;text-align:center;padding:24px">Tidak ada data.</p>';
    } else {
      html += '<div style="overflow-x:auto"><table>';
      html += '<thead><tr><th>Kategori</th><th>Turunan</th><th>Tahun</th><th>Periode</th><th style="text-align:right">Nilai</th></tr></thead><tbody>';
      rows.forEach(([k,v]) => {
        const d = decode(k);
        html += `<tr>
          <td>${esc(d.wilayah)}</td>
          <td>${esc(d.turunan)}</td>
          <td>${esc(d.tahun)}</td>
          <td>${esc(d.periode)}</td>
          <td style="text-align:right"><b>${esc(v)}</b></td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      html += `<details style="margin-top:14px;font-size:12px;color:#888"><summary style="cursor:pointer">Raw JSON response</summary><pre style="max-height:300px">${esc(JSON.stringify(r, null, 2))}</pre></details>`;
    }

    openModal(html);
  } catch (e) {
    openModal(`
      <h3>❌ Gagal ambil data</h3>
      <pre>${esc(e.message)}</pre>
      <p style="color:#666;font-size:13px;margin-top:10px">Coba:</p>
      <ul style="color:#666;font-size:13px;line-height:1.6">
        <li>Ganti wilayah ke <b>0000 · Indonesia (Pusat)</b></li>
        <li>Pilih variabel lain</li>
        <li>Refresh halaman (Ctrl+Shift+R)</li>
      </ul>
    `);
  }
}

function showDetail(json, modelHint) {
  const d = JSON.parse(json);
  const labels = {
    sdgs_id:'ID SDGs', sdg_id:'ID SDGs', target_id:'ID Target', indicator_id:'ID Indikator',
    title:'Judul', name:'Nama', goal:'Goal', target:'Target', indicator:'Indikator',
    description:'Deskripsi', desc:'Deskripsi', definition:'Definisi',
    unit:'Satuan', value:'Nilai', source:'Sumber', updt_date:'Tanggal Update',
    cr_date:'Tanggal Dibuat', rl_date:'Tanggal Rilis', year:'Tahun',
    category:'Kategori', subj:'Subject', sub_name:'Subject',
  };
  const pretty = k => labels[k] || k.replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase());

  const title = d.title || d.name || d.indicator || 'Detail';
  const icon  = modelHint === 'sdgs' ? '🌍' : 'ℹ️';

  let html = `<h3>${icon} ${esc(title)}</h3>`;

  // Badge row kalau ada goal/target/indicator
  const badges = [];
  if (d.goal)       badges.push(`<span class="pill">Goal: ${esc(d.goal)}</span>`);
  if (d.target)     badges.push(`<span class="pill muted">Target: ${esc(d.target)}</span>`);
  if (d.indicator)  badges.push(`<span class="pill muted">Indikator: ${esc(d.indicator)}</span>`);
  if (d.unit)       badges.push(`<span class="pill muted">Satuan: ${esc(d.unit)}</span>`);
  if (badges.length) html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${badges.join('')}</div>`;

  // Deskripsi/definisi panjang → render sebagai blok
  const longFields = ['description','desc','definition'];
  longFields.forEach(f => {
    if (d[f]) {
      html += `<div style="background:#f8fafc;border-left:3px solid var(--accent);padding:12px 16px;border-radius:6px;margin-bottom:14px;font-size:14px;line-height:1.6;color:#334155">${esc(d[f])}</div>`;
    }
  });

  // Key-value grid untuk sisanya
  const skip = new Set(['title','name','goal','target','indicator','unit','description','desc','definition']);
  const entries = Object.entries(d).filter(([k,v]) =>
    !skip.has(k) && v != null && v !== '' &&
    typeof v !== 'object'
  );
  if (entries.length) {
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px">`;
    entries.forEach(([k,v]) => {
      const val = String(v).slice(0, 400);
      html += `<div style="background:#f8fafc;padding:10px 14px;border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700">${esc(pretty(k))}</div>
        <div style="font-weight:500;margin-top:3px;word-break:break-word">${esc(val)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Array fields (nested list)
  Object.entries(d).forEach(([k,v]) => {
    if (Array.isArray(v) && v.length) {
      html += `<h4 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px">${esc(pretty(k))} (${v.length})</h4>`;
      html += `<ul style="padding-left:18px;font-size:13px;line-height:1.7;margin:0">`;
      v.slice(0,20).forEach(item => {
        const label = (typeof item === 'object') ? (item.title || item.name || JSON.stringify(item).slice(0,100)) : String(item);
        html += `<li>${esc(label)}</li>`;
      });
      if (v.length > 20) html += `<li style="color:var(--muted)">… dan ${v.length-20} lagi</li>`;
      html += `</ul>`;
    }
  });

  // Raw JSON expandable
  html += `<details style="margin-top:16px;font-size:12px;color:var(--muted)"><summary style="cursor:pointer">Raw JSON</summary><pre style="max-height:300px">${esc(JSON.stringify(d, null, 2))}</pre></details>`;

  openModal(html);
}

function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }
document.getElementById('modalBg').onclick = (e) => { if (e.target.id==='modalBg') closeModal(); };
document.addEventListener('keyup', e => { if (e.key==='Escape') closeModal(); });

document.getElementById('searchBtn').onclick = () => { currentPage=1; search(); };
document.getElementById('keyword').addEventListener('keyup', e => { if (e.key==='Enter'){currentPage=1; search();} });
document.getElementById('domain').addEventListener('change', () => { currentPage=1; search(); });

(async () => {
  buildNav();
  updateHint();
  const ok = await checkAuth();
  if (!ok) return;
  await loadDomains();
  search();
})();
</script>
